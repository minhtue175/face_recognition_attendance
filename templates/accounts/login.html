{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Hệ thống điểm danh</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="auth-page">

<div class="login-container">
  
  <div class="login-card">
    
    <div class="login-logo">
      <div class="logo-icon">🎓</div>
    </div>
    <h1 class="login-title">Hệ thống điểm danh</h1>
    <p class="login-sub">Đăng nhập để tiếp tục</p>


    <div class="role-tabs">
      <button type="button" class="role-tab active" onclick="switchRole(this)">Giảng viên</button>
      <button type="button" class="role-tab" onclick="switchRole(this)">Sinh viên</button>
    </div>


    
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-error" style="color: red; margin-bottom: 15px; text-align: center; font-weight: bold;">
            {{ msg }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}


      <div class="form-group">
        <label for="username">Tên đăng nhập</label>
        <input type="text" id="username" name="username"
               placeholder="Nhập tên đăng nhập" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password"
                 placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="toggle-pw" onclick="togglePw()">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-login">Đăng nhập →</button>
    </form>

    <p class="register-link">
      Chưa có tài khoản? <a href="{% url 'register' %}">Đăng ký ngay</a>
    </p>

    <p class="forgot-hint">Quên mật khẩu? Liên hệ quản trị viên</p>
  </div>
</div>

<script>
  // 1. Ẩn/hiện mật khẩu
  function togglePw() {
    const pwInput = document.getElementById("password");
    if (pwInput.type === "password") {
      pwInput.type = "text";
    } else {
      pwInput.type = "password";
    }
  }

  // 2. Hiệu ứng chuyển Tab Giảng viên / Sinh viên
  function switchRole(element) {
    document.querySelectorAll('.role-tab').forEach(tab => tab.classList.remove('active'));
    element.classList.add('active');
  }
</script>
</body>
</html>
