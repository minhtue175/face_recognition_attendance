{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Hệ thống điểm danh</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="auth-page">

<div class="login-container">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon">🎓</div>
    </div>
    <h1 class="login-title">Hệ thống điểm danh</h1>
    <p class="login-sub">Đăng nhập để tiếp tục</p>

    <!-- Chọn vai trò -->
    <div class="role-tabs">
      <button class="role-tab active" data-role="teacher">Giảng viên</button>
      <button class="role-tab"        data-role="student">Sinh viên</button>
    </div>
    <input type="hidden" name="role" id="selected-role" value="teacher">

    <!-- Thông báo lỗi từ Django messages -->
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-error">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <!-- Form -->
    <form method="POST" action="{% url 'login' %}" id="login-form">
      {% csrf_token %}
      <input type="hidden" name="role" id="role-field" value="teacher">

      <div class="form-group">
        <label for="username">Tên đăng nhập</label>
        <input type="text" id="username" name="username"
               placeholder="Nhập tên đăng nhập" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password"
                 placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="toggle-pw" onclick="togglePw()">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-login">Đăng nhập →</button>
    </form>

    <p class="register-link">
      Chưa có tài khoản? <a href="{% url 'register' %}">Đăng ký ngay</a>
    </p>

    <p class="forgot-hint">Quên mật khẩu? Liên hệ quản trị viên</p>
  </div>
</div>

<script src="{% static 'js/login.js' %}"></script>
</body>
</html>
